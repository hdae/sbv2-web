name: CI

on:
  push:
    branches: [main]
  pull_request:

# 読み取りのみ（checkout）。write は付与しない＝最小権限。
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # fmt + lint + 型 + test（version_sync の drift ガードを含む）。--allow-read は deno.json 読取用。
      # onnxruntime-node の native package を CI で落とさないため node backend の型検査（check:node）は含めない。
      - run: deno task check
